name: Quality Gate

on:
  pull_request:
  push:

jobs:
  lint-and-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: File length guard
        run: python scripts/check_file_length.py --strict

      - name: Ruff (changed files only)
        shell: bash
        run: |
          BASE_REF="HEAD~1"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          fi
          python scripts/run_ruff_changed.py --base-ref "${BASE_REF}"

[tool.ruff]
line-length = 120
target-version = "py39"
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  ".pytest_cache",
  ".ruff_cache",
  "instance",
  "repos",
  "logs",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"app.py" = ["E402"]
"tests/**/*.py" = ["E402", "F401"]

{% extends "base.html" %}

{% block title %}登录 - Diff确认平台{% endblock %}

{% block head %}
<style>
    :root {
        --auth-bg-top: #eef4ff;
        --auth-bg-bottom: #f7fbff;
        --auth-line: #d9e6ff;
        --auth-card: #ffffff;
        --auth-text-main: #10223a;
        --auth-text-sub: #4b5d77;
        --auth-accent: #1d63e8;
        --auth-accent-2: #0b4dc7;
    }

    .auth-page {
        position: relative;
        min-height: calc(100vh - 180px);
        padding: 2.2rem 1rem;
        font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif;
        background:
            radial-gradient(120% 90% at 90% 0%, rgba(29,99,232,0.12) 0%, rgba(29,99,232,0) 60%),
            linear-gradient(180deg, var(--auth-bg-top) 0%, var(--auth-bg-bottom) 100%);
        overflow: hidden;
    }

    .auth-page::before,
    .auth-page::after {
        content: "";
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        border: 1px solid var(--auth-line);
        pointer-events: none;
    }

    .auth-page::before {
        top: -140px;
        left: -90px;
    }

    .auth-page::after {
        right: -120px;
        bottom: -160px;
    }

    .auth-shell {
        max-width: 1080px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 1.1rem;
        align-items: stretch;
    }

    .auth-side {
        border-radius: 20px;
        padding: 2rem 1.8rem;
        color: var(--auth-text-main);
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid var(--auth-line);
        backdrop-filter: blur(6px);
        animation: authEnter 420ms ease-out both;
    }

    .auth-side h2 {
        margin: 0 0 0.8rem;
        font-size: 1.52rem;
        font-weight: 700;
        letter-spacing: 0.02em;
    }

    .auth-side p {
        margin: 0 0 1.4rem;
        color: var(--auth-text-sub);
        line-height: 1.7;
        font-size: 0.95rem;
    }

    .auth-points {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.7rem;
    }

    .auth-points li {
        color: #284466;
        font-size: 0.88rem;
        padding: 0.58rem 0.72rem;
        border-radius: 10px;
        border: 1px solid #d8e4fb;
        background: rgba(241, 247, 255, 0.92);
    }

    .auth-card {
        border-radius: 20px;
        background: var(--auth-card);
        border: 1px solid #dce7fb;
        box-shadow: 0 14px 40px rgba(16, 34, 58, 0.12);
        overflow: hidden;
        animation: authEnter 520ms ease-out both;
    }

    .auth-card-header {
        padding: 1.7rem 1.8rem 1.3rem;
        color: #fff;
        background: linear-gradient(138deg, var(--auth-accent) 0%, var(--auth-accent-2) 100%);
    }

    .auth-card-header h3 {
        margin: 0 0 0.36rem;
        font-size: 1.28rem;
        font-weight: 700;
        letter-spacing: 0.01em;
    }

    .auth-card-header p {
        margin: 0;
        opacity: 0.9;
        font-size: 0.88rem;
    }

    .auth-alerts {
        padding: 1rem 1.8rem 0;
    }

    .auth-alerts .alert {
        margin: 0;
        border-radius: 10px;
        font-size: 0.88rem;
    }

    .auth-form {
        padding: 1.35rem 1.8rem 1.65rem;
    }

    .auth-field {
        margin-bottom: 0.95rem;
    }

    .auth-label {
        display: block;
        margin-bottom: 0.34rem;
        color: #27415f;
        font-weight: 600;
        font-size: 0.84rem;
    }

    .auth-input-wrap {
        position: relative;
    }

    .auth-input {
        width: 100%;
        border: 1.4px solid #d2def3;
        border-radius: 11px;
        background: #f8fbff;
        color: #173250;
        padding: 0.68rem 2.55rem 0.68rem 0.78rem;
        font-size: 0.92rem;
        transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .auth-input:focus {
        outline: none;
        border-color: var(--auth-accent);
        box-shadow: 0 0 0 3px rgba(29,99,232,0.14);
        background: #fff;
    }

    .pwd-toggle {
        position: absolute;
        right: 9px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #4f6b8f;
        min-width: 42px;
        width: auto;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
        writing-mode: horizontal-tb;
        line-height: 1;
        font-size: 12px;
        padding: 0 7px;
    }

    .pwd-toggle:hover {
        background: #eaf2ff;
        color: var(--auth-accent);
    }

    .auth-submit {
        width: 100%;
        border: none;
        border-radius: 11px;
        padding: 0.74rem .9rem;
        font-size: .95rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(138deg, var(--auth-accent) 0%, var(--auth-accent-2) 100%);
        transition: transform .16s ease, box-shadow .16s ease;
    }

    .auth-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 22px rgba(11,77,199,0.28);
    }

    .auth-footer {
        border-top: 1px solid #e7eefb;
        padding-top: 1.05rem;
        margin-top: 1.15rem;
        text-align: center;
        font-size: 0.86rem;
        color: #5f7592;
    }

    .auth-footer a {
        color: var(--auth-accent);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        color: var(--auth-accent-2);
    }

    @keyframes authEnter {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
        .auth-shell {
            grid-template-columns: 1fr;
        }

        .auth-side {
            order: 2;
        }

        .auth-card {
            order: 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-shell">
        <section class="auth-side">
            <h2>欢迎回来</h2>
            <p>登录后可继续进行项目差异确认、仓库配置和审批操作。</p>
            <ul class="auth-points">
                <li>统一账号体系与权限隔离</li>
                <li>支持项目级审批与追踪</li>
                <li>帮助文档可直接访问，无需登录</li>
            </ul>
        </section>

        <section class="auth-card">
            <header class="auth-card-header">
                <h3>账号登录</h3>
                <p>输入用户名和密码进入平台</p>
            </header>

            <div class="auth-alerts" id="authAlerts"></div>

            <form method="POST" action="{{ url_for('auth_bp.login') }}" id="loginForm" class="auth-form">
                <input type="hidden" name="next" value="{{ next_url or '' }}">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <div class="auth-field">
                    <label for="username" class="auth-label">用户名</label>
                    <div class="auth-input-wrap">
                        <input
                            type="text"
                            class="auth-input"
                            id="username"
                            name="username"
                            value="{{ form_username or '' }}"
                            placeholder="请输入用户名"
                            required
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                </div>

                <div class="auth-field">
                    <label for="password" class="auth-label">密码</label>
                    <div class="auth-input-wrap">
                        <input
                            type="password"
                            class="auth-input"
                            id="password"
                            name="password"
                            placeholder="请输入密码"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="pwd-toggle" id="toggleLoginPassword" aria-label="切换密码可见状态">
                            <span id="loginPwdIcon">显示</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit" id="loginBtn">登录</button>

                <div class="auth-footer">
                    还没有账号？<a href="{{ url_for('auth_bp.register') }}">立即注册</a>
                </div>
            </form>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    (function () {
        var alerts = document.querySelectorAll('main.container-fluid > .alert');
        var host = document.getElementById('authAlerts');
        if (alerts.length && host) {
            alerts.forEach(function (item) {
                host.appendChild(item);
            });
        }
    })();

    (function () {
        var btn = document.getElementById('toggleLoginPassword');
        var input = document.getElementById('password');
        var icon = document.getElementById('loginPwdIcon');
        if (!btn || !input || !icon) return;

        btn.addEventListener('click', function () {
            var visible = input.type === 'text';
            input.type = visible ? 'password' : 'text';
            icon.textContent = visible ? '显示' : '隐藏';
        });
    })();

    (function () {
        var form = document.getElementById('loginForm');
        var btn = document.getElementById('loginBtn');
        if (!form || !btn) return;

        form.addEventListener('submit', function () {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>登录中...';
        });
    })();
</script>
{% endblock %}
